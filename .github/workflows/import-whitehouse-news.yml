name: Import White House News

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scrape mode: incremental or backfill."
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - backfill
      max_pages:
        description: "Optional page limit for testing or controlled runs."
        required: false
        type: string
      force:
        description: "Re-fetch and overwrite known URLs."
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: import-whitehouse-news
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r Scrapers/requirements.txt

      - name: Import White House news
        shell: bash
        env:
          MODE: ${{ inputs.mode || 'incremental' }}
          MAX_PAGES: ${{ inputs.max_pages }}
          FORCE: ${{ inputs.force || false }}
        run: |
          set -euo pipefail
          args=("--${MODE}")
          if [[ -n "${MAX_PAGES}" ]]; then
            args+=("--max-pages" "${MAX_PAGES}")
          fi
          if [[ "${FORCE}" == "true" ]]; then
            args+=("--force")
          fi
          python Scrapers/whitehouse_news_scraper.py "${args[@]}"

      - name: Generate listing
        run: python Scrapers/generate_listing.py

      - name: Verify generated output
        run: |
          set -euo pipefail
          test -f listing.json
          if grep -R -nE '/Users/|Local source|sourcePath|govinfoBulkSourcePath' README.md Actions Briefings "Fact Sheets" Releases Remarks Research listing.json 2>/dev/null; then
            echo "Local path leak detected." >&2
            exit 1
          fi

      - name: Commit generated changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No generated changes to commit."
            exit 0
          fi

          git add Actions Briefings "Fact Sheets" Releases Remarks Research Scrapers/state.json listing.json
          git commit -m "Import White House news"
          git push
